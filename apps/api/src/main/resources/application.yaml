spring:
  application:
    name: algo-review-api
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
